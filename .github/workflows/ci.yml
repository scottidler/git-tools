name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.96.0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install rkvr (worktree migrate/flatten fail closed without it)
        run: cargo install --git https://github.com/scottidler/rkvr rkvr

      - name: Run tests
        run: cargo test --workspace --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --release --verbose

      - name: Collect workspace binaries
        run: |
          mkdir -p artifacts/
          # Enumerate every workspace binary target (skips lib-only crates like
          # `common`) so a newly added tool is picked up automatically instead of
          # a hardcoded list silently dropping one -- mirrors binary-release.yml
          # and how `otto install` loops over the workspace.
          bins=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[].targets[] | select(.kind[] == "bin") | .name' | sort -u)
          for bin in $bins; do
            cp "target/release/$bin" artifacts/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-tools-${{ matrix.os }}
          path: artifacts/*
